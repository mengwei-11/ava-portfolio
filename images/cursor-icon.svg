<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 黑色背景圆 -->
  <circle cx="50" cy="50" r="48" fill="black"/>
  <!-- 外圆线 -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width="5"/>
  <!-- 整体内容旋转 -45度（向左倾斜） -->
  <g transform="rotate(-45, 50, 50)">
    <!-- 上方三角形 △（空心，只有轮廓线） -->
    <polygon points="50,16 28,50 72,50" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- 下方 V 形线条（不封口，只有两条线） -->
    <polyline points="28,56 50,84 72,56" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
